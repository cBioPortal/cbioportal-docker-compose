services:
  cbioportal:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CBIOPORTAL}
    container_name: cbioportal-container
    env_file:
      - .env
    environment:
      SERVER_PORT: ${CBIOPORTAL_SERVER_PORT}
    ports:
      - "8080:8080"
    entrypoint: [ "/cbioportal/entrypoint.sh" ]
    volumes:
      - ./study:/study/
      - ./entrypoint.sh:/cbioportal/entrypoint.sh

      - ${APPLICATION_PROPERTIES_PATH:-./config/application.properties}:/cbioportal-webapp/application.properties:ro
      # We need to mount the derived table script into the cbioportal container
      # The metaImport script looks for it under $PORTAL_HOME
      - ./data/generate_derived_tables.sql:/cbioportal/generate_derived_tables.sql:ro
    depends_on:
      cbioportal-database:
        condition: service_healthy
      cbioportal-migration:
        condition: service_completed_successfully
      cbioportal-session:
        condition: service_started
    networks:
     - cbio-net
    command: /bin/sh -c "java -Xms2g -Xmx4g -cp '/cbioportal-webapp:/cbioportal-webapp/lib/*' org.cbioportal.PortalApplication --spring.config.location=file:/cbioportal-webapp/application.properties --authenticate=false --session.service.url=http://cbioportal-session:5001/api/sessions/my_portal/ --clickhouse_mode=true --spring.profiles.active=clickhouse"

  cbioportal-database:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CLICKHOUSE}
    container_name: cbioportal-database-container
    env_file:
      - .env
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/schema.sql:/data/schema.sql:ro
      - ./data/load_schema.sh:/docker-entrypoint-initdb.d/001_load_schema.sh:ro
      - ./data/seed.sql.gz:/data/seed.sql.gz:ro
      - ./data/load_seed.sh:/docker-entrypoint-initdb.d/002_load_seed.sh:ro
      - ./data/generate_derived_tables.sql:/data/generate_derived_tables.sql:ro
      - ./data/load_derived_tables.sh:/docker-entrypoint-initdb.d/003_load_derived_tables.sh:ro
      - cbioportal_clickhouse_data:/var/lib/clickhouse
    networks:
      - cbio-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=$$CLICKHOUSE_USER --password=$$CLICKHOUSE_PASSWORD --query=\"SELECT COUNT(*) FROM $$CLICKHOUSE_DB.type_of_cancer\" 2>/dev/null | grep -q '^[1-9]'"]
      interval: 10s
      timeout: 3s
      retries: 300
      start_period: 5m

  # Applies any pending base-table schema migrations (db-scripts/clickhouse/migrate/migrate_schema.sql,
  # via migrate_db.py) before the cbioportal app starts. On a fresh install this is a no-op, since
  # schema.sql already seeds `info` at the current db_schema_version. Runs from the cbioportal image
  # itself (not a host-mounted script) since that image already bundles python3, a clickhouse client,
  # and db-scripts/clickhouse/migrate/. --regenerate-derived-tables also regenerates derived tables
  # automatically whenever generate_derived_tables.sql's version differs from the database's
  # current derived_table_schema_version, so docker-compose users don't need a manual step.
  cbioportal-migration:
    image: ${DOCKER_IMAGE_CBIOPORTAL}
    container_name: cbioportal-migration-container
    env_file:
      - .env
    depends_on:
      cbioportal-database:
        condition: service_healthy
    networks:
      - cbio-net
    entrypoint: ["python3", "/cbioportal/db-scripts/clickhouse/migrate/migrate_db.py", "--regenerate-derived-tables"]
    restart: "no"

  cbioportal-session:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_SESSION_SERVICE}
    container_name: cbioportal-session-container
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SESSION_SERVICE_SERVER_PORT}
      JAVA_OPTS: ${SESSION_SERVICE_JAVA_OPTS}
    depends_on:
      - cbioportal-session-database
    networks:
      - cbio-net

  cbioportal-session-database:
    restart: unless-stopped
    image: mongo:4.2
    container_name: cbioportal-session-database-container
    env_file:
      - .env
    volumes:
      - cbioportal_mongo_data:/data/db
    networks:
      - cbio-net

networks:
  cbio-net:

volumes:
  cbioportal_clickhouse_data:
  cbioportal_mongo_data:
  sql-files:
