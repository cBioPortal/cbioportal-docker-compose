services:
  cbioportal:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CBIOPORTAL}
    container_name: cbioportal-container
    env_file:
      - .env
    environment:
      SERVER_PORT: ${CBIOPORTAL_SERVER_PORT}
    ports:
      - "8080:8080"
    entrypoint: [ "/cbioportal/entrypoint.sh" ]
    volumes:
      - ./study:/study/
      - ./entrypoint.sh:/cbioportal/entrypoint.sh

      - ./config/application.properties:/cbioportal-webapp/application.properties:ro
      - ./config/log4j.properties:/cbioportal-webapp/log4j.properties:ro
      - ./data/schema.sql:/cbioportal/schema.sql:ro
      - ./data/seed.sql.gz:/cbioportal/seed.sql.gz:ro
      - ./data/clickhouse.sql:/cbioportal/clickhouse.sql:ro
    depends_on:
      cbioportal-database:
        condition: service_healthy
      cbioportal-session:
        condition: service_started
    networks:
      - cbio-net
    command: /bin/sh -c "java -Xms2g -Xmx4g -cp '/cbioportal-webapp:/cbioportal-webapp/lib/*' org.cbioportal.PortalApplication --spring.config.location=file:/cbioportal-webapp/application.properties --authenticate=false --session.service.url=http://cbioportal-session:5001/api/sessions/my_portal/ --clickhouse_mode=$${APP_CLICKHOUSE_MODE:-true} --spring.profiles.active=$${APP_SPRING_PROFILE:-default}"

  cbioportal-database:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CLICKHOUSE}
    container_name: cbioportal-database-clickhouse-container
    env_file:
      - .env
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse_user_settings.xml:/etc/clickhouse-server/users.d/user_settings.xml:ro
      - cbioportal_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - cbio-net

  cbioportal-session:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_SESSION_SERVICE}
    container_name: cbioportal-session-container
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SESSION_SERVICE_SERVER_PORT}
      JAVA_OPTS: ${SESSION_SERVICE_JAVA_OPTS}
    depends_on:
      - cbioportal-session-database
    networks:
      - cbio-net

  cbioportal-session-database:
    restart: unless-stopped
    image: mongo:4.2
    container_name: cbioportal-session-database-container
    env_file:
      - .env
    volumes:
      - cbioportal_mongo_data:/data/db
    networks:
      - cbio-net

networks:
  cbio-net:

volumes:
  cbioportal_clickhouse_data:
  cbioportal_mongo_data:
  sql-files:
