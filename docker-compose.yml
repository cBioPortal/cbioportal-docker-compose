services:
  cbioportal:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CBIOPORTAL}
    container_name: cbioportal-container
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
     - ./study:/study/
     - ${APPLICATION_PROPERTIES_PATH:-./config/application.properties}:/cbioportal-webapp/application.properties:ro
    depends_on:
     - cbioportal-clickhouse-database
     - cbioportal-session
    networks:
     - cbio-net
    command: /bin/sh -c "java -Xms2g -Xmx4g -jar /cbioportal-webapp/app.jar --spring.config.location=file:/cbioportal-webapp/application.properties --authenticate=false --session.service.url=http://cbioportal-session:5001/api/sessions/my_portal/ --clickhouse_mode=$${APP_CLICKHOUSE_MODE:-true} --spring.profiles.active=$${APP_SPRING_PROFILE:-default}"
  cbioportal-clickhouse-database:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_CLICKHOUSE}
    container_name: cbioportal-database-clickhouse-container
    env_file:
      - .env
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse/:/docker-entrypoint-initdb.d/:ro
      - cbioportal_clickhouse_data:/var/lib/clickhouse
    networks:
      - cbio-net
  cbioportal-clickhouse-schema-extractor:
    image: ${DOCKER_IMAGE_CBIOPORTAL}
    container_name: cbioportal-clickhouse-schema-extractor-container
    volumes:
      - sql-files:/sql
    command: sh -c "cd /tmp && jar xf /cbioportal-webapp/app.jar BOOT-INF/classes/db-scripts/clickhouse/clickhouse.sql && cp BOOT-INF/classes/db-scripts/clickhouse/*.sql /sql/"
  cbioportal-session:
    restart: unless-stopped
    image: ${DOCKER_IMAGE_SESSION_SERVICE}
    container_name: cbioportal-session-container
    env_file:
      - .env
    environment:
      JAVA_OPTS: ${SESSION_SERVICE_JAVA_OPTS}
    depends_on:
      - cbioportal-session-database
    networks:
      - cbio-net

  cbioportal-session-database:
    restart: unless-stopped
    image: mongo:4.2
    container_name: cbioportal-session-database-container
    env_file:
      - .env
    volumes:
      - cbioportal_mongo_data:/data/db
    networks:
      - cbio-net

networks:
  cbio-net:

volumes:
  cbioportal_clickhouse_data:
  cbioportal_mongo_data:
  sql-files:
